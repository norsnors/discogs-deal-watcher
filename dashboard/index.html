<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline';" />
  <title>Discogs Deal Watcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="assets/logo.svg" alt="" width="30" height="30" />
      <h1>Deal Watcher</h1>
    </div>
    <div class="status" id="status">
      <button class="svc idle" id="svc-badge" type="button" title="Service status — click to open on GitHub">
        <span class="svc-dot" id="svc-dot"></span>
        <span class="svc-label" id="svc-label">checking…</span>
      </button>
      <span class="pill" id="pill-sweep">—</span>
      <span class="pill" id="pill-wantlist">—</span>
      <span class="pill" id="pill-deals">—</span>
    </div>
    <div class="actions">
      <button id="btn-scan" class="scan" title="Scan your WHOLE wantlist now for current bargains (~13 min)">⚡ Scan now</button>
      <button id="btn-quickscan" class="scan ghost" title="Quick scan: only the highest-priority releases (~4–5 min). Misses quiet releases this run — they roll into the next scan.">⚡ Quick</button>
      <button id="btn-fullscan" class="scan ghost" title="Deep refresh: full wantlist scan AND re-scrape EVERY sold-median, ignoring the weekly cache (not 50 at a time). Most thorough — guarantees every reference is current — but slow (~30–60 min). Cancellable.">⚡ Full + medians</button>
      <button id="btn-refresh" title="Refresh">↻</button>
      <button id="btn-settings" title="Settings">⚙</button>
    </div>
  </header>

  <!-- Live scan progress (hidden unless a local scan is running) -->
  <div id="scanbar" class="scanbar hidden">
    <div class="scanbar-track"><div class="scanbar-fill" id="scan-fill"></div></div>
    <span class="scanbar-text" id="scan-text">Starting scan…</span>
    <button id="btn-scan-cancel" class="ghost small">Stop</button>
  </div>

  <section class="filters">
    <input type="search" id="search" placeholder="Search artist or title…" />
    <label class="f">Min value (VG+)
      <input type="range" id="minValue" min="0" max="100" step="5" value="25" />
      <span id="minValueVal">€25+</span>
    </label>
    <label class="f">Min % off
      <input type="range" id="minDiscount" min="40" max="95" step="5" value="50" />
      <span id="minDiscountVal">50%</span>
    </label>
    <label class="f">Max total
      <input type="range" id="maxTotal" min="0" max="150" step="5" value="0" />
      <span id="maxTotalVal">any</span>
    </label>
    <label class="f">Shipping est.
      <input type="range" id="shipEst" min="0" max="25" step="1" value="5" />
      <span id="shipEstVal">€5</span>
    </label>
    <label class="f">Sort
      <select id="sortBy">
        <option value="best">Best first</option>
        <option value="discount">Biggest % off</option>
        <option value="total">Lowest total</option>
        <option value="savings">Most € saved</option>
        <option value="newest">Newest</option>
      </select>
    </label>
    <label class="f checkbox" title="Only show copies that look VG+ or better. Scan deals use the REAL listing grade; cloud/email deals can't be condition-verified, so this hides ALL of them — leave it off to see what you were emailed."><input type="checkbox" id="vgPlusOnly" /> VG+ only</label>
    <label class="f checkbox"><input type="checkbox" id="freshOnly" /> Just listed</label>
    <label class="f checkbox" title="Reveal deals you've hidden with the × button"><input type="checkbox" id="showHidden" /> Show hidden</label>
    <label class="f checkbox" title="Show releases that looked cheap but didn't qualify, with the reason why (local scan only)"><input type="checkbox" id="showNearMiss" /> Show near-misses</label>
    <span class="spacer"></span>
    <span class="count" id="resultCount"></span>
  </section>

  <main id="deals" class="deals"></main>
  <div id="empty" class="empty hidden"></div>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-card">
      <h2>Settings</h2>
      <p class="hint">Where should the dashboard read already-found deals from? (The <b>⚡ Scan now</b> button always works locally, independently of this.)</p>
      <label>Source
        <select id="set-sourceType">
          <option value="github">GitHub Actions — reads the committed deals.json (default)</option>
          <option value="server">Live server — watcher.js on Fly / localhost</option>
        </select>
      </label>
      <div class="src src-github">
        <label>GitHub repo (owner/name)
          <input type="text" id="set-githubRepo" placeholder="norsnors/discogs-deal-watcher" />
        </label>
        <label>GitHub access token <span class="opt">(only for a private repo)</span>
          <input type="password" id="set-githubToken" placeholder="leave blank for a public repo" />
        </label>
      </div>
      <div class="src src-server hidden">
        <label>Server URL
          <input type="text" id="set-apiBase" placeholder="https://your-watcher.fly.dev  or  http://localhost:8787" />
        </label>
        <label>Dashboard token
          <input type="password" id="set-token" placeholder="the DASHBOARD_TOKEN you set on the server" />
        </label>
      </div>
      <label>Background scan while open <span class="opt">(keeps sold-medians + the email watcher fresh)</span>
        <select id="set-autoScan">
          <option value="0">Off</option>
          <option value="1">Every 1 hour</option>
          <option value="2">Every 2 hours</option>
          <option value="3">Every 3 hours</option>
          <option value="6">Every 6 hours</option>
          <option value="12">Every 12 hours</option>
          <option value="24">Every 24 hours</option>
        </select>
      </label>
      <div id="set-test" class="test-result"></div>
      <div class="modal-actions">
        <button id="set-test-btn" class="ghost">Test connection</button>
        <span class="spacer"></span>
        <button id="set-cancel" class="ghost">Cancel</button>
        <button id="set-save" class="primary">Save</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
