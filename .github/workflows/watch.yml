# Runs one rotating-slice sweep on a schedule (the "GitHub every few minutes" model).
# State (history/cursor/alert-memory) is carried between runs via the Actions cache;
# deals.json is committed so the desktop dashboard can read it via the GitHub API.
#
# Setup: push this folder to a GitHub repo, then add repo Secrets:
#   DISCOGS_TOKEN, DISCOGS_USERNAME, RESEND_API_KEY, MAIL_TO (riminiexpressdj@gmail.com), MAIL_FROM
#
# Minutes note: scheduled runs cost Actions minutes on PRIVATE repos (2000/mo free). Each run is
# short (no npm install needed for the Resend path). */15 ≈ within free tier; raise the interval if
# you're close, or make the repo PUBLIC (Actions is unlimited for public repos).
name: discogs-deal-watch

on:
  schedule:
    # Requested every 15 min, but GitHub deprioritizes public-repo schedule crons HARD: measured
    # reality is a tick every ~60-90 min (night gaps up to ~4 h) regardless of what's asked here.
    # Two mitigations: (1) the minutes are offset from :00/:15/:30/:45 — the congested marks where
    # delays are worst; (2) RUN_BUDGET_MINUTES below makes each tick sweep repeatedly (~50 min of
    # back-to-back ~14-min sweeps, emailing after each), so sparse ticks still give near-continuous
    # coverage instead of one sweep per hour.
    - cron: '4,19,34,49 * * * *'
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write             # to commit deals.json back

concurrency:
  group: discogs-watch
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 95   # budgeted sweeps end themselves around ~75 min; this is the hang backstop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The Resend email path needs no npm packages. Gmail users: uncomment the next line.
      # - run: npm ci --omit=dev

      - name: Restore state (history / cursor / alert memory)
        uses: actions/cache@v4
        with:
          path: state
          key: ddw-state-${{ github.run_id }}
          restore-keys: ddw-state-

      - name: Run one sweep
        env:
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          DISCOGS_USERNAME: ${{ secrets.DISCOGS_USERNAME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          SLICE_SIZE: '750'   # priority sweep: cover the WHOLE wantlist (~715) every sweep. At ~1.1s/call one
                              # sweep is ~13-14 min; if the list grows past ~750 the staleness term rolls the
                              # overflow into the next sweep (no copy is starved).
          # Budget depends on how this run was started:
          #  - schedule (GitHub's own cron): keep sweeping back-to-back for ~70 min (emailing after
          #    EVERY sweep, gems immediately). GitHub only actually fires this cron every ~75-90 min
          #    (night gaps up to ~4 h), so one-sweep-per-tick would mean hours of detection latency.
          #    Verified live (2026-07-05): a 50-min budget ran 4 sweeps of 10.5-13.5 min each.
          #    This is the self-contained fallback every fork gets for free.
          #  - workflow_dispatch (external trigger / manual run): ONE sweep (~13-14 min) then exit.
          #    The owner runs a Cloudflare Worker cron (workspace folder discogs-watch-cron, NOT in
          #    this repo) that dispatches every 15 min — reliable round-the-clock cadence, so each
          #    poke should do a single sweep and get out of the way of the next one.
          RUN_BUDGET_MINUTES: ${{ github.event_name == 'workflow_dispatch' && '0' || '70' }}
          MODE: balanced
          MIN_REFERENCE: '25'      # skip low-value records: VG+ suggestion must be >= EUR25 (kills noise, keeps diamonds)
          SHIPPING_ESTIMATE: '5'   # add EUR5 to the item price; the alert threshold uses the total
        run: node watch-once.js

      - name: Publish deals.json + gems.json + state-seed.json for the dashboard / cache recovery
        run: |
          git config user.name "deal-watcher"
          git config user.email "deal-watcher@users.noreply.github.com"
          git add deals.json gems.json state-seed.json
          git commit -m "deals update [skip ci]" || echo "no changes"
          # A budgeted run holds this checkout for ~an hour, so the owner (or the dashboard's
          # medians auto-push) may well have pushed to main meanwhile — rebase first or the push is
          # rejected and the publish silently lost (seen live 2026-07-05). The bot only ever touches
          # deals/gems/state-seed; owner pushes touch other files, so the rebase never conflicts.
          git pull --rebase --autostash origin main || echo "rebase failed (will retry next run)"
          git push || echo "nothing to push"

      # Keep the cron alive: GitHub disables scheduled workflows after 60 days with no *user* activity.
      #
      # We USED to use gautamkrishnar/keepalive-workflow@v2 here, but GitHub TOS-blocked that repo
      # (since 2025-04-21). Referencing a blocked action makes the runner's "Getting action download
      # info" step fail with "Repository access blocked" BEFORE any step runs — which failed the whole
      # job in ~3s every 15 min (continue-on-error can't save it; the failure is in action resolution,
      # not step execution). So the third-party action is gone.
      #
      # Replacement is an inline, dependency-free re-enable: GitHub auto-disables a scheduled workflow
      # after 60 days of inactivity, and the only reliable signals that reset the clock are a *user*
      # push or a manual run. The owner's local dashboard scans push as the owner (the documented
      # primary keepalive). As a zero-dependency backstop, when the last commit is older than ~50 days
      # we make a real commit via the API using a committer identity (best-effort, never fatal).
      # If you want a fully hands-off guarantee, add a fine-grained PAT secret (KEEPALIVE_PAT, contents:write)
      # and this step will push with it so the push counts as user activity.
      - name: Keep the schedule alive (avoid the 60-day auto-disable)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.KEEPALIVE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          last_commit_epoch=$(git log -1 --format=%ct)
          now_epoch=$(date +%s)
          age_days=$(( (now_epoch - last_commit_epoch) / 86400 ))
          echo "Days since last commit: $age_days"
          if [ "$age_days" -ge 50 ]; then
            echo "Approaching the 60-day auto-disable window; making a keepalive commit."
            git commit --allow-empty -m "keepalive: avoid 60-day cron auto-disable [skip ci]"
            git push || echo "keepalive push failed (non-fatal)"
          else
            echo "Recent activity present; no keepalive commit needed."
          fi
